name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --dev

      - name: Ruff check
        run: uv run ruff check src/et_mlapi/ tests/

      - name: Ruff format
        run: uv run ruff format --check src/et_mlapi/ tests/


  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --dev

      - name: ty check
        run: uv run ty check


  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen --dev

      - name: Unit tests
        run: uv run pytest tests/unit -n auto -v -m 'not slow' --cov --cov-report=term-missing -k "not process_pool"
        env:
          PYTHONPATH: src

      - name: Integration tests
        run: uv run pytest tests/integration -v -m slow
        env:
          PYTHONPATH: src


  version:
    name: Version
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: |
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          major=$(echo "$latest" | sed 's/v//' | cut -d. -f1)
          minor=$(echo "$latest" | sed 's/v//' | cut -d. -f2)
          patch=$(echo "$latest" | sed 's/v//' | cut -d. -f3)
          new_tag="v${major}.${minor}.$((patch + 1))"
          echo "Bumping $latest → $new_tag"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$new_tag" -m "Release $new_tag"
          git push origin "$new_tag"
          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"


  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: version
    if: ${{ vars.DOCKER_PUBLISH == 'true' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
