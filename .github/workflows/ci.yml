name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --dev --quiet
      - run: uv run ruff check src/et_mlapi/ tests/
      - run: uv run ruff format --check src/et_mlapi/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --dev --quiet
      - run: uv run ty check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --dev --quiet
      - run: uv run pytest tests/unit -n auto -v -m 'not slow' --cov --cov-report=term-missing
        env:
          PYTHONPATH: src

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: ${{ env.UV_VERSION }}
      - run: uv sync --dev --quiet
      - run: uv run pytest tests/integration -v -m slow
        env:
          PYTHONPATH: src

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: ${{ vars.DOCKER_PUBLISH == 'true' }}
    needs: [lint, typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: et-mlapi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
