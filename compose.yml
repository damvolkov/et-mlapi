services:
  et-mlapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: et-mlapi
    hostname: et-mlapi
    restart: unless-stopped
    ports:
      - "${PORT:-8012}:8012"
    volumes:
      - ./data/config:/app/data/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
